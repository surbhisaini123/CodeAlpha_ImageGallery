<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>My Image Gallery</title>
</head>
<body>
    <h2>MY  IMAGE  GALLERY</h2>
    <div class="buttons">
        <button data-name="all">All</button>
        <button data-name="flower">Flower</button>
        <button data-name="animal">Animal</button>
        <button data-name="nature">Nature</button>
        <button data-name="bird">Bird</button>

    </div>
  
    <div class="inside">
        <img src="images\img1.jpg" data-category="Nature">
        <img src="images\img2.jpg" data-category="Nature">
        <img src="images\img3.jpg" data-category="Animal">
        <img src="images\img4.jpg" data-category="Animal">
        <img src="images\img5.jpg" data-category="Animal">
        <img src="images\img6.jpg" data-category="Nature">
        <img src="images/img7.jpg" data-category="Bird">
        <img src="images/img8.jpg" data-category="Flower">
        <img src="images/img13.jpeg" data-category="Animal">
        <img src="images/img15.jpg" data-category="Nature">
        <img src="images/img14.jpg" data-category="Animal">
        <img src="images/img12.webp" data-category="Animal">
        <img src="images/imag10.jpg" data-category="Flower">
        <img src="images/ima11.jpg" data-category="Animal">
        <img src="images/imag9.jpg" data-category="Flower">

    </div>
    <div class="lightbox">
         <button class="close">❌</button>
         <button class="Previous">⏮️</button>
         <img class="lightbox-img">
        
        <button class="next">⏭️</button>
    </div>
 
    <script src="script.js"></script>
</body>
</html>
